<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta property="og:title" content="MEDIS">
  <meta property="og:description" content="Media Embedding Delivery for Interactive Sharing.">
  <meta property="og:type" content="website">
  <title>MEDIS | Media Embedding</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="status-bar">
    <div class="status-item" id="downloading-status">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3,15V19A2,2 0 0,0 5,21H19A2,2 0 0,0 21,19V15H19V19H5V15H3M12,14L17,9H14V3H10V9H7L12,14Z"></path></svg>
      <span id="downloading-count">0</span>
      <span>downloading</span>
    </div>
    <div class="status-item" id="completed-status">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.5 2 2 6.5 2 12S6.5 22 12 22 22 17.5 22 12 17.5 2 12 2M10 17L5 12L6.41 10.59L10 14.17L17.59 6.58L19 8L10 17Z"></path></svg>
      <span id="completed-count">0</span>
      <span>completed</span>
    </div>
    <div class="progress-bar-container" id="progress-bar-container" style="display: none;">
      <div class="progress-bar-inner" id="progress-bar-inner"></div>
    </div>
    <div class="status-item" id="speed-status" style="display: none;">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4C9.11 4 6.6 5.64 5.35 8.04C2.34 8.36 0 10.91 0 14C0 17.31 2.69 20 6 20H19C21.76 20 24 17.76 24 15C24 12.36 21.95 10.22 19.35 10.04Z"></path></svg>
      <span id="download-speed">0 B/s</span>
    </div>
  </div>

  <div class="container">
    <header>
      <div class="logo">
        <h1>MEDIS</h1>
        <span>Media Embedding Delivery for Interactive Sharing</span>
      </div>
      <p>Fetch, convert, and share videos from any link with a simple, fast, and platform-agnostic workflow.</p>
    </header>

    <main>
      <section class="form-container">
        <div class="input-wrapper">
          <input type="text" id="video-url" placeholder="Paste a video link (YouTube, Instagram, TikTok, etc.)" />
          <button id="download-btn" aria-label="Download Video">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          </button>
        </div>
        <div id="loading-indicator" class="hidden">
          <div class="spinner"></div>
          <span>Downloading, please wait...</span>
        </div>
      </section>

      <section class="video-list-container">
        <h2>Downloaded Videos</h2>
        <div id="video-list"></div>
      </section>
    </main>
  </div>

  <div id="toast-container"></div>
  <script src="app.js"></script>
</body>
</html>
